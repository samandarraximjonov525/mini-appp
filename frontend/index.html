<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#03030c">
<title>DigiPro — Excellence in Innovation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --bg: #03030c;
  --card-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent-cyan: #00f5c4;
  --accent-purple: #7c6bff;
  --accent-pink: #ff6b9d;
  --text-main: #f3f4f6;
  --text-dim: rgba(243, 244, 246, 0.6);
  --radius: 24px;
  --ease: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
}

/* Background Effects */
.bg-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: 
    radial-gradient(circle at 10% 10%, rgba(124, 107, 255, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(0, 245, 196, 0.1) 0%, transparent 45%);
}
.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
}

.glass {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  transition: var(--ease);
}

/* Header */
header { padding: 25px 20px 10px; }
.logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem;
  background: linear-gradient(135deg, #fff, var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Navigation */
.nav-container {
  padding: 0 20px 20px;
  position: sticky; top: 0; z-index: 100;
}
.nav-pill {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 6px;
  display: flex; gap: 4px;
}
.nav-item {
  flex: 1; border: none; background: transparent; color: var(--text-dim);
  padding: 10px; border-radius: 40px; font-weight: 600; font-size: 0.85rem;
  transition: var(--ease); display: flex; align-items: center; justify-content: center; gap: 8px;
}
.nav-item.active {
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
  color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
}

/* Cards */
.card-srv {
  padding: 24px; cursor: pointer; height: 100%;
  display: flex; flex-direction: column; gap: 15px;
}
.card-srv:hover {
  transform: translateY(-5px); border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
}
.srv-icon {
  width: 54px; height: 54px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  background: rgba(255,255,255,0.04);
}
.srv-price {
  font-weight: 800; font-size: 1.1rem; color: var(--accent-cyan);
}

/* Portfolio */
.port-item {
  position: relative; overflow: hidden; height: 180px; border-radius: 20px;
}
.port-img {
  width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease;
}
.port-item:hover .port-img { transform: scale(1.1); }
.port-overlay {
  position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
  opacity: 0; transition: opacity 0.4s;
}
.port-item:hover .port-overlay { opacity: 1; }

/* Forms */
.input-group-custom {
  background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
  border-radius: 16px; transition: var(--ease); display: flex; align-items: center;
}
.input-group-custom:focus-within {
  border-color: var(--accent-purple); box-shadow: 0 0 0 4px rgba(124, 107, 255, 0.15);
}
.input-custom {
  background: transparent !important; border: none !important; color: #fff !important;
  padding: 15px !important; flex-grow: 1; font-weight: 500; outline: none; box-shadow: none !important;
}
.input-custom::placeholder { color: rgba(255,255,255,0.25); }

.btn-glow {
  width: 100%; border: none; padding: 18px; border-radius: 18px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  color: #03030c; font-weight: 800; font-family: 'Syne', sans-serif;
  box-shadow: 0 10px 30px rgba(124, 107, 255, 0.3); transition: var(--ease);
}
.btn-glow:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0, 245, 196, 0.4); }

/* Chat */
#chat-messages { height: calc(100vh - 350px); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.9rem; line-height: 1.4; position: relative; }
.msg-me { align-self: flex-end; background: var(--accent-purple); color: #fff; border-bottom-right-radius: 4px; }
.msg-them { align-self: flex-start; background: rgba(255,255,255,0.08); color: #fff; border-bottom-left-radius: 4px; }
.msg-ts { font-size: 0.6rem; opacity: 0.5; margin-top: 4px; display: block; }

/* Footer */
footer {
  margin-top: 50px; padding: 40px 20px; border-top: 1px solid var(--glass-border);
  text-align: center; color: var(--text-dim);
}
.social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
.social-links a { color: #fff; font-size: 1.5rem; transition: var(--ease); }
.social-links a:hover { color: var(--accent-cyan); transform: translateY(-3px); }

/* Animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-up { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<header>
  <div class="logo">DIGIPRO</div>
  <p style="color:var(--text-dim); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:3px;">Evolution of IT</p>
</header>

<div class="nav-container">
  <div class="nav-pill">
    <button class="nav-item active" id="btn-services" onclick="showSec('services')"><i class="bi bi-grid-fill"></i> Katalog</button>
    <button class="nav-item" id="btn-portfolio" onclick="showSec('portfolio')"><i class="bi bi-briefcase-fill"></i> Ishlar</button>
    <button class="nav-item" id="btn-chat" onclick="showSec('chat')"><i class="bi bi-chat-dots-fill"></i> Chat</button>
    <button class="nav-item" id="btn-order" onclick="showSec('order')"><i class="bi bi-send-fill"></i> Buyurtma</button>
  </div>
</div>

<main class="container px-3">
  
  <!-- Katalog Section -->
  <section id="sec-services">
    <div class="row g-3" id="services-list"></div>
  </section>

  <!-- Portfolio Section -->
  <section id="sec-portfolio" style="display:none;">
    <div class="row g-3" id="portfolio-list"></div>
  </section>

  <!-- Chat Section -->
  <section id="sec-chat" style="display:none;">
    <div class="glass p-3 mb-3">
      <div id="chat-messages"></div>
      <div class="input-group-custom mt-2">
        <input type="text" id="chat-input" class="input-custom" placeholder="Xabar yozing...">
        <button class="btn p-3 text-cyan" onclick="sendMessage()"><i class="bi bi-send-fill"></i></button>
      </div>
    </div>
  </section>

  <!-- Order Section -->
  <section id="sec-order" style="display:none;">
    <div class="glass p-4 animate-up">
      <h3 style="font-family:'Syne',sans-serif; margin-bottom:20px;">Loyiha so'rovi</h3>
      <form id="order-form" onsubmit="event.preventDefault(); submitOrder();">
        <div class="mb-3">
          <label class="small text-white-50 ms-2 mb-1">Ismingiz</label>
          <div class="input-group-custom">
            <input type="text" id="name" class="input-custom" placeholder="F.I.SH" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="small text-white-50 ms-2 mb-1">Aloqa raqami</label>
          <div class="input-group-custom">
            <input type="tel" id="contact" class="input-custom" placeholder="+998" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="small text-white-50 ms-2 mb-1">Xizmat turi</label>
          <div class="input-group-custom">
            <select id="service" class="input-custom form-select" required style="color: #fff; background: rgba(255,255,255,0.05) !important;">
              <option value="" disabled selected style="background: #101018; color: #fff;">Tanlang...</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="small text-white-50 ms-2 mb-1">Promokod (ixtiyoriy)</label>
          <div class="input-group-custom">
            <input type="text" id="promo" class="input-custom" placeholder="Masalan: BAYRAM2024" onchange="checkPromo()">
            <span id="promo-status" class="pe-3 small"></span>
          </div>
        </div>
        <div class="mb-4">
          <label class="small text-white-50 ms-2 mb-1">Loyiha haqida</label>
          <div class="input-group-custom">
            <textarea id="desc" class="input-custom" rows="3" placeholder="Maqsadingiz va kutinglar..."></textarea>
          </div>
        </div>
        <div id="price-summary" class="mb-4 d-none">
          <div class="glass p-3 d-flex justify-content-between align-items-center">
            <span>Narxi:</span>
            <span class="fw-bold text-cyan" id="final-price">0 UZS</span>
          </div>
        </div>
        <button type="submit" class="btn-glow" id="btn-submit">YUBORISH</button>
      </form>
    </div>
  </section>

</main>

<footer>
  <div class="social-links">
    <a href="https://t.me/samandar_dev_me"><i class="bi bi-telegram"></i></a>
    <a href="https://instagram.com/samandar.dev"><i class="bi bi-instagram"></i></a>
    <a href="https://github.com/samandar-dev"><i class="bi bi-github"></i></a>
  </div>
  <p>&copy; 2024 DigiPro Hub. Barcha huquqlar himoyalangan.</p>
  <p class="small mt-2">Dasturchi: <b>Samandar Dev</b></p>
</footer>

<script>
const tg = window.Telegram?.WebApp;
const API = window.location.origin.includes('localhost') ? 'http://localhost:8080' : window.location.origin;
const USER_ID = String(tg?.initDataUnsafe?.user?.id || 'LOCAL_USER');

let currentService = null;
let currentPromo = null;

if(tg) { tg.ready(); tg.expand(); }

function showSec(id) {
  ['services','portfolio','order','chat'].forEach(s => {
    const el = document.getElementById('sec-'+s);
    if(el) el.style.display = 'none';
  });
  ['services','portfolio','order','chat'].forEach(b => {
    const btn = document.getElementById('btn-'+b);
    if(btn) btn.classList.remove('active');
  });
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.style.display = 'block';
  const btn = document.getElementById('btn-'+id);
  if(btn) btn.classList.add('active');
  
  if(id === 'chat') { 
    loadMessages();
    setTimeout(loadMessages, 500); // Back up load
  }
  window.scrollTo(0,0);
}

async function loadServices() {
  try {
    const res = await fetch(`${API}/api/public/services`);
    const data = await res.json();
    const list = document.getElementById('services-list');
    list.innerHTML = data.map((s, i) => `
      <div class="col-12 animate-up" style="animation-delay: ${i*0.1}s;">
        <div class="glass card-srv" onclick="selectService('${s.name}', ${s.price})">
          <div class="d-flex align-items-center justify-content-between">
            <div class="srv-icon" style="color:${s.color};">
              <i class="bi ${s.icon}"></i>
            </div>
            <div class="srv-price">${s.price.toLocaleString()} UZS</div>
          </div>
          <div>
            <h5 class="fw-bold mb-1">${s.name}</h5>
            <p class="small text-white-50 m-0">${s.description}</p>
          </div>
        </div>
      </div>
    `).join('');
    
    document.getElementById('service').innerHTML = '<option value="" disabled selected style="background: #101018; color: #fff;">Tanlang...</option>' + data.map(s => `<option value="${s.name}" data-price="${s.price}" style="background: #101018; color: #fff;">${s.name}</option>`).join('');
  } catch (e) { console.error(e); }
}

async function loadPortfolio() {
  try {
    const res = await fetch(`${API}/api/public/portfolio`);
    const data = await res.json();
    const list = document.getElementById('portfolio-list');
    list.innerHTML = data.map((p, i) => `
      <div class="col-6 animate-up" style="animation-delay: ${i*0.1}s;">
        <div class="port-item glass">
          <img src="${p.image_url || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400'}" class="port-img">
          <div class="port-overlay">
            <div class="text-white fw-bold small">${p.title}</div>
            <div style="font-size:0.6rem; color:var(--accent-cyan);">${p.category}</div>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) { console.error(e); }
}

function selectService(name, price) {
  document.getElementById('service').value = name;
  updatePrice();
  showSec('order');
}

async function checkPromo() {
  const code = document.getElementById('promo').value.toUpperCase();
  const status = document.getElementById('promo-status');
  if(!code) { currentPromo = null; status.textContent = ''; updatePrice(); return; }
  
  try {
    const res = await fetch(`${API}/api/public/promocodes/${code}`);
    if(res.ok) {
      currentPromo = await res.json();
      status.textContent = '✅ Qabul qilindi';
      status.style.color = '#00f5c4';
    } else {
      currentPromo = null;
      status.textContent = '❌ Noto\'g\'ri';
      status.style.color = '#ff6b9d';
    }
    updatePrice();
  } catch (e) { console.error(e); }
}

function updatePrice() {
  const sel = document.getElementById('service');
  const opt = sel.options[sel.selectedIndex];
  let price = opt ? parseInt(opt.dataset.price || 0) : 0;
  
  if(currentPromo && price > 0) {
    if(currentPromo.type === 'PERCENT') price *= (1 - currentPromo.value / 100);
    else if(currentPromo.type === 'FIXED') price = Math.max(0, price - currentPromo.value);
    else if(currentPromo.type === 'FREE') price = 0;
  }
  
  const summary = document.getElementById('price-summary');
  if(price > 0 || (currentPromo && currentPromo.type === 'FREE')) {
    summary.classList.remove('d-none');
    document.getElementById('final-price').textContent = price.toLocaleString() + ' UZS';
  } else {
    summary.classList.add('d-none');
  }
}

document.getElementById('service').addEventListener('change', updatePrice);

async function submitOrder() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'YUBORILMOQDA...';

  const payload = {
    name: document.getElementById('name').value,
    contact: document.getElementById('contact').value,
    service: document.getElementById('service').value,
    desc: document.getElementById('desc').value,
    promo: currentPromo ? currentPromo.code : null
  };

  try {
    const res = await fetch(`${API}/api/public/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-ID': USER_ID },
      body: JSON.stringify(payload)
    });

    if(res.ok) {
      Swal.fire({
        title: 'Muvaffaqiyat!',
        text: 'Buyurtmangiz qabul qilindi. Tez orada bog\'lanamiz.',
        icon: 'success',
        background: '#101018',
        color: '#fff',
        confirmButtonColor: '#7c6bff'
      }).then(() => location.reload());
    } else { throw new Error(); }
  } catch (e) {
    Swal.fire('Xatolik', 'Qayta urinib ko\'ring', 'error');
    btn.disabled = false;
    btn.textContent = 'YUBORISH';
  }
}

// Chat Logic
async function loadMessages() {
  try {
    const res = await fetch(`${API}/api/chat/${USER_ID}`);
    const data = await res.json();
    const box = document.getElementById('chat-messages');
    const oldLen = box.children.length;
    
    box.innerHTML = data.map(m => `
      <div class="msg ${m.sender_id == USER_ID ? 'msg-me' : 'msg-them'} animate-up">
        ${m.text}
        <span class="msg-ts">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
      </div>
    `).join('');
    
    if(data.length > oldLen && oldLen > 0) {
      if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      // SweetAlert Notification if not in chat tab
      if(document.getElementById('sec-chat').style.display === 'none') {
        Swal.fire({
          toast: true,
          position: 'top-end',
          icon: 'info',
          title: 'Yangi xabar keldi!',
          showConfirmButton: false,
          timer: 3000,
          background: '#7c6bff',
          color: '#fff'
        });
      }
    }
    box.scrollTop = box.scrollHeight;
  } catch (e) { console.error(e); }
}

async function sendMessage() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  
  inp.value = '';
  try {
    await fetch(`${API}/api/chat/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-ID': USER_ID },
      body: JSON.stringify({ receiver_id: 'ADMIN', text })
    });
    loadMessages();
  } catch (e) { console.error(e); }
}

setInterval(() => { if(document.getElementById('sec-chat').style.display === 'block') loadMessages(); }, 5000);

document.addEventListener('DOMContentLoaded', () => {
  loadServices();
  loadPortfolio();
});
</script>
</body>
</html>
